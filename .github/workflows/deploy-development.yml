name: Deploy Development

on:
  push:
    branches:
      - development
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Audit dependencies
        run: npm audit

      - name: Build Next app
        run: npm run build

      - name: Apply development D1 migrations
        run: npx wrangler d1 migrations apply mustravelz-development --remote --config worker/wrangler.jsonc --env development

      - name: Deploy development API Worker
        working-directory: worker
        run: ../node_modules/.bin/wrangler deploy --env development
